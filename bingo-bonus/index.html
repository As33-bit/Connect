<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>麻將賓果抽牌</title>
  <style>
    :root{
      --bg:#1b0d04;
      --panel:#2a1608;
      --panel2:#3a220d;
      --gold:#ffd15a;
      --text:#fff3cf;
      --muted:#c7a875;
      --red:#ff3b30;
      --green:#51d66b;
      --line:#ff2b2b;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      background:radial-gradient(circle at top,#3b210e 0%,#1b0d04 45%,#090300 100%);
      color:var(--text);
      font-family:"Microsoft JhengHei","PingFang TC",Arial,sans-serif;
      overflow-x:hidden;
    }

    button{
      border:0;
      border-radius:12px;
      padding:10px 14px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      color:#2a1608;
      background:linear-gradient(#ffe58a,#ffbd38);
      box-shadow:0 4px 0 #8f5410,0 8px 18px rgba(0,0,0,.28);
      user-select:none;
    }

    button:active{ transform:translateY(2px); box-shadow:0 2px 0 #8f5410,0 6px 14px rgba(0,0,0,.25); }
    button:disabled{ opacity:.38; cursor:not-allowed; filter:grayscale(1); }
    button.ghost{ background:#5a3517; color:var(--text); box-shadow:0 4px 0 #1b0d04; }
    button.active{ outline:3px solid #fff0a6; }

    .app{
      width:min(1040px,100%);
      margin:0 auto;
      padding:8px 8px 20px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding:8px;
      background:rgba(27,13,4,.92);
      border-bottom:1px solid rgba(255,209,90,.22);
      backdrop-filter:blur(6px);
    }

      .topbar-left,
      .topbar-center,
      .topbar-right{
        display:flex;
        align-items:center;
      gap:8px;
    }

    .topbar-center{
      flex:1;
      justify-content:center;
      flex-wrap:wrap;
    }

    .status{
      min-width:160px;
      text-align:center;
      font-weight:900;
      color:var(--gold);
      font-size:18px;
    }

    .coin-status{
      display:flex;
      align-items:center;
      gap:6px;
      min-width:92px;
      justify-content:flex-start;
      color:var(--gold);
      font-size:18px;
      font-weight:900;
    }

    .coin-icon{
      width:24px;
      height:24px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 28%,#fff6a8 0 16%,#ffd15a 17% 58%,#b87316 59% 100%);
      box-shadow:0 2px 0 #8f5410,0 0 10px rgba(255,209,90,.5);
      display:inline-block;
      position:relative;
    }

    .coin-icon::after{
      content:"";
      position:absolute;
      inset:6px;
      border-radius:50%;
      border:2px solid rgba(143,84,16,.55);
    }

    .bet-select{
      border:1px solid rgba(255,209,90,.45);
      border-radius:10px;
      padding:9px 12px;
      background:#3a220d;
      color:var(--text);
      font-size:15px;
      font-weight:900;
      outline:none;
    }

    .ad-button{
      white-space:nowrap;
    }

    .secret-count-toggle{
      width:28px;
      height:34px;
      padding:0;
      border-radius:8px;
      background:transparent;
      box-shadow:none;
      opacity:.01;
    }

    .secret-count-toggle:active{
      transform:none;
      box-shadow:none;
    }

    .help-modal{
      position:fixed;
      inset:0;
      z-index:220;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(0,0,0,.72);
    }

    .help-modal.show{ display:flex; }

    .help-dialog{
      position:relative;
      max-width:min(92vw,760px);
      max-height:90vh;
      background:#1b0d04;
      border:1px solid rgba(255,209,90,.35);
      border-radius:12px;
      box-shadow:0 18px 40px rgba(0,0,0,.55);
      padding:12px;
    }

    .help-dialog img{
      display:block;
      max-width:100%;
      max-height:82vh;
      object-fit:contain;
      border-radius:8px;
    }

    .help-close{
      position:absolute;
      right:-10px;
      top:-10px;
      width:34px;
      height:34px;
      padding:0;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      line-height:1;
    }

    .music-toggle{
      width:42px;
      height:42px;
      padding:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      line-height:1;
    }

    .music-toggle.off{
      opacity:.42;
      filter:grayscale(1);
    }

    .hint{
      margin:6px auto 8px;
      max-width:920px;
      color:var(--muted);
      line-height:1.55;
      font-size:14px;
      text-align:center;
    }

    .layout{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      align-items:start;
    }

    .board-wrap{
      width:min(640px,100%);
      margin:0 auto;
      position:relative;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 12px 28px rgba(0,0,0,.5);
    }

    .board-img{
      width:100%;
      display:block;
      user-select:none;
      pointer-events:none;
    }

    .board-grid{
      position:absolute;
      left:2.345%;
      top:1.563%;
      width:95.076%;
      height:96.719%;
      display:grid;
      grid-template-columns:135fr 136fr 132fr 140fr 136fr 132fr;
      grid-template-rows:210fr 199fr 198fr 203fr 199fr 229fr;
      pointer-events:none;
    }

    .board-cell{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:visible;
    }

    .board-cell-tile{
      width:88%;
      height:96%;
      object-fit:contain;
      display:block;
      pointer-events:none;
      user-select:none;
      filter:drop-shadow(0 2px 5px rgba(0,0,0,.45));
      z-index:1;
    }

    .board-cell.placed::after{
      content:"";
      position:absolute;
      inset:7%;
      border:4px solid rgba(255,220,80,.95);
      border-radius:10px;
      box-shadow:0 0 14px rgba(255,220,80,.9), inset 0 0 12px rgba(255,220,80,.35);
      pointer-events:none;
    }

    .board-cell.supplement-placed::after{
      border-color:rgba(64,224,255,.98);
      box-shadow:0 0 15px rgba(64,224,255,.95), inset 0 0 12px rgba(64,224,255,.36);
    }

    .board-cell.supplement-placed .board-cell-tile{
      filter:drop-shadow(0 2px 5px rgba(0,0,0,.45)) saturate(1.25) hue-rotate(155deg);
    }

    .board-cell.near::before{
      content:"聽牌";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      z-index:2;
      min-width:70%;
      padding:4px 5px;
      border-radius:8px;
      background:rgba(255,59,48,.38);
      color:#fff;
      font-size:11px;
      font-weight:900;
      line-height:1.2;
      text-align:center;
      box-shadow:0 2px 8px rgba(0,0,0,.22);
      pointer-events:none;
    }

    .line-layer{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      overflow:visible;
    }

    .line-layer line{
      stroke:var(--line);
      stroke-width:10;
      stroke-linecap:round;
      filter:drop-shadow(0 0 7px rgba(255,0,0,.9));
    }

    .panel{
      background:linear-gradient(180deg,rgba(66,38,15,.96),rgba(27,13,4,.96));
      border:1px solid rgba(255,209,90,.23);
      border-radius:12px;
      box-shadow:0 10px 24px rgba(0,0,0,.35);
      padding:12px;
    }

    .panel-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
      color:var(--gold);
      font-weight:900;
      font-size:18px;
    }

    .panel-title-actions{
      display:flex;
      align-items:center;
      gap:10px;
      margin-left:auto;
    }

    .panel-title .inline-action{
      padding:7px 12px;
      font-size:14px;
      border-radius:10px;
      white-space:nowrap;
    }

    .auto-place-toggle{
      display:flex;
      align-items:center;
      gap:6px;
      color:#f4ddb1;
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
      user-select:none;
    }

    .auto-place-toggle input{
      width:16px;
      height:16px;
      accent-color:var(--gold);
      cursor:pointer;
    }

    .select-area{
      max-height:42vh;
      overflow:auto;
      padding:10px 4px;
      touch-action:none;
    }

    .tile-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(58px,1fr));
      gap:12px;
      align-items:center;
    }

    body.bonus-mode .topbar,
    body.bonus-mode .hint{
      display:none !important;
    }

    body.bonus-mode .app{
      padding:0 4px 4px;
    }

    body.bonus-mode #selectPanel{
      order:-1;
      width:min(860px,100%);
      margin:0 auto;
      padding:6px;
    }

    body.bonus-mode #selectPanel .select-area{
      max-height:none;
      overflow:visible;
    }

    body.bonus-mode #selectGrid{
      grid-template-columns:repeat(9,minmax(0,1fr));
      gap:6px;
    }

    body.bonus-mode #selectGrid .tile-btn{
      min-height:72px;
    }

    body.bonus-mode #selectGrid .tile-img{
      width:54px;
      height:72px;
    }

    body.bonus-playing .hint,
    body.bonus-playing #selectPanel,
    body.bonus-playing #pickedCounter,
    body.bonus-playing .picked-panel .empty-note{
      display:none !important;
    }

    body.bonus-playing .bottom:not(.supplement-mode) .unused-panel{
      display:none !important;
    }

    body.bonus-playing .bottom{
      display:grid !important;
      grid-template-columns:1fr !important;
      margin-top:2px;
    }

    body.bonus-playing .bottom:not(.supplement-mode) .picked-panel{
      display:block !important;
      padding:5px;
    }

    body.bonus-playing .bottom:not(.supplement-mode) .picked-panel .panel-title{
      margin:0 0 4px;
      font-size:12px;
      line-height:1.2;
    }

    body.bonus-playing .played-list{
      padding:0;
      min-height:0;
      max-height:none;
      overflow:visible;
    }

    .tile-btn{
      position:relative;
      min-height:76px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
      background:transparent;
      border:0;
      cursor:pointer;
      padding:0;
      box-shadow:none;
      overflow:visible;
      -webkit-tap-highlight-color:transparent;
    }

    .tile-btn:active{ transform:none; box-shadow:none; }

    .tile-img{
      width:58px;
      height:76px;
      object-fit:contain;
      display:block;
      background:transparent !important;
      border:0 !important;
      outline:0 !important;
      box-shadow:none !important;
      filter:none;
      mix-blend-mode:normal;
      opacity:1;
      user-select:none;
      pointer-events:none;
    }

    .tile-btn.selected .badge{
      display:flex;
    }

    .tile-btn.disabled{
      cursor:not-allowed;
      opacity:.45;
      filter:grayscale(1);
    }

    .badge{
      position:absolute;
      left:-6px;
      top:-7px;
      min-width:24px;
      height:24px;
      padding:0 6px;
      display:none;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      background:var(--gold);
      color:#2a1608;
      font-weight:900;
      font-size:14px;
      line-height:1;
      box-shadow:0 3px 8px rgba(0,0,0,.35);
      z-index:3;
      pointer-events:none;
    }

    .bottom{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:14px;
    }

    .bottom.bottom-hidden{
      display:none;
    }

    .bottom.picked-only{
      grid-template-columns:1fr;
    }

    .bottom.picked-only .unused-panel{
      display:none;
    }

    .bottom.supplement-mode{
      grid-template-columns:1fr;
    }

    .bottom.supplement-mode .picked-panel{
      display:none;
    }

    .played-list,
    .unused-list{
      min-height:120px;
      max-height:34vh;
      overflow:auto;
      padding:8px 4px;
    }

    .small .tile-grid{
      grid-template-columns:repeat(auto-fill,minmax(46px,1fr));
      gap:9px;
    }

    .small .tile-img{
      width:46px;
      height:60px;
    }

    .small .tile-btn{
      min-height:62px;
    }

    .empty-note{
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
      padding:8px;
    }

    .peek-mask{
      position:fixed;
      inset:0;
      z-index:100;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.62);
      touch-action:none;
    }

    .peek-mask.show{ display:flex; }
    .peek-mask.manual-place{ background:rgba(0,0,0,.42); }

    .peek-card-wrap{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      width:auto;
      height:auto;
      max-width:min(320px,72vw);
      max-height:70vh;
      background:transparent !important;
      border:0 !important;
      outline:0 !important;
      box-shadow:none !important;
      overflow:visible !important;
    }

    .peek-mask.manual-place .peek-card-wrap{
      position:fixed;
      z-index:115;
      transform:translate(-50%,-50%);
      pointer-events:none;
    }

    .peek-mask.tile-place .peek-card-wrap{
      position:fixed;
      z-index:130;
      transform:translate(-50%,-50%);
      pointer-events:auto;
      cursor:grab;
    }

    .peek-mask.tile-place .peek-tile{
      max-width:min(120px,26vw) !important;
      max-height:22vh !important;
      cursor:grab;
    }

    .peek-mask.tile-place .peek-tile.dragging{
      cursor:grabbing;
    }

    .peek-tile{
      width:auto;
      height:auto;
      max-width:min(320px,72vw);
      max-height:70vh;
      object-fit:contain;
      display:block;
      background:transparent !important;
      border:0 !important;
      outline:0 !important;
      box-shadow:none !important;
      filter:drop-shadow(0 8px 14px rgba(0,0,0,.55)) !important;
      mix-blend-mode:normal !important;
      user-select:none;
      pointer-events:none;
    }

    .finger{
      position:fixed;
      z-index:120;
      width:min(620px,100vw);
      max-width:100vw;
      height:auto;
      transform:translate(-50%,-50%);
      user-select:none;
      pointer-events:auto;
      cursor:grab;
      background:transparent !important;
      border:0 !important;
      outline:0 !important;
      box-shadow:none !important;
      filter:drop-shadow(0 8px 16px rgba(0,0,0,.35)) !important;
      mix-blend-mode:normal !important;
      touch-action:none;
    }

    .finger.dragging{ cursor:grabbing; }

    .result-box{
      margin-top:10px;
      padding:10px;
      border-radius:12px;
      background:rgba(0,0,0,.22);
      color:var(--text);
      line-height:1.6;
      font-size:14px;
    }

    .result-box b{ color:var(--gold); }

    .result-modal{
      position:fixed;
      inset:0;
      z-index:230;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(0,0,0,.72);
    }

    .result-modal.show{ display:flex; }

    .result-dialog{
      position:relative;
      width:min(94vw,720px);
      background:linear-gradient(180deg,rgba(66,38,15,.98),rgba(27,13,4,.98));
      border:2px solid rgba(255,209,90,.46);
      border-radius:16px;
      box-shadow:0 18px 40px rgba(0,0,0,.58);
      padding:28px;
      color:var(--text);
    }

    .result-dialog h2{
      margin:0 0 14px;
      color:var(--gold);
      font-size:36px;
      line-height:1.2;
    }

    .result-dialog-content{
      line-height:1.8;
      font-size:22px;
      font-weight:800;
    }

    .result-dialog-content b{ color:var(--gold); }

    .result-image-wrap{
      display:none;
      justify-content:center;
      margin:0 0 18px;
    }

    .result-image-wrap.show{ display:flex; }

    .result-image-wrap img{
      max-width:100%;
      max-height:34vh;
      object-fit:contain;
      border-radius:12px;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.45));
    }

    .result-close{
      position:absolute;
      right:-14px;
      top:-14px;
      width:44px;
      height:44px;
      padding:0;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      line-height:1;
    }

    .hide{ display:none !important; }

    @media (max-width:760px){
      .app{ padding:5px 5px 14px; }

      .topbar{
        gap:5px;
        padding:5px;
        align-items:center;
      }

      .topbar-left{ flex:1 1 auto; min-width:0; }
      .topbar-right{ margin-left:auto; }

      .topbar-center{
        order:3;
        flex:0 0 100%;
        display:grid;
        grid-template-columns:minmax(0,1fr) auto;
        gap:5px;
        justify-content:stretch;
      }

      #betSelect{ width:100%; min-width:0; }
      .topbar-center button{ white-space:nowrap; }

      button{
        font-size:12px;
        line-height:1.15;
        padding:7px 8px;
        border-radius:9px;
        box-shadow:0 3px 0 #8f5410,0 6px 12px rgba(0,0,0,.24);
      }

      .coin-status{
        min-width:auto;
        font-size:16px;
        gap:5px;
      }

      .coin-icon{ width:21px; height:21px; }

      .bet-select{
        font-size:12px;
        padding:7px 7px;
        border-radius:9px;
      }

      .music-toggle{
        width:34px;
        height:34px;
        font-size:19px;
      }

      .hint{
        font-size:11px;
        line-height:1.35;
        margin:0 auto 4px;
        max-width:92vw;
      }

      .layout{ gap:7px; }
      .board-wrap{ width:min(72vw,280px); border-radius:9px; }
      .line-layer line{ stroke-width:8; }

      body.bonus-mode .layout{
        gap:2px;
      }

      body.bonus-mode .board-wrap{
        width:min(78vw,310px);
      }

      .panel{
        padding:7px;
        border-radius:10px;
      }

      .panel-title{
        font-size:13px;
        gap:5px;
        margin-bottom:5px;
        align-items:flex-start;
      }

      .panel-title > span{
        min-width:0;
        line-height:1.25;
      }

      .panel-title-actions{
        gap:5px;
        flex-shrink:0;
      }

      .panel-title .inline-action{
        font-size:11px;
        padding:5px 6px;
        border-radius:8px;
      }

      .auto-place-toggle{
        gap:3px;
        font-size:11px;
      }

      .auto-place-toggle input{
        width:14px;
        height:14px;
      }

      .select-area{
        max-height:none;
        overflow:visible;
        padding:4px 1px;
      }

      .tile-grid{
        grid-template-columns:repeat(auto-fill,minmax(34px,1fr));
        gap:4px;
      }

      .tile-img{
        width:34px;
        height:45px;
      }

      body.bonus-mode #selectPanel{
        width:100%;
        padding:5px;
      }

      body.bonus-mode #selectGrid{
        grid-template-columns:repeat(9,minmax(0,1fr));
        gap:2px;
      }

      body.bonus-mode #selectGrid .tile-btn{
        min-height:39px;
      }

      body.bonus-mode #selectGrid .tile-img{
        width:29px;
        height:38px;
      }

      body.bonus-playing .bottom:not(.supplement-mode) .picked-panel{
        padding:4px;
      }

      .tile-btn{
        min-height:47px;
        border-radius:8px;
      }

      .badge{
        left:-4px;
        top:-5px;
        min-width:19px;
        height:19px;
        padding:0 4px;
        font-size:11px;
      }

      .bottom{
        grid-template-columns:1fr;
        gap:10px;
        margin-top:6px;
      }

      .bottom.supplement-mode{
        grid-template-columns:1fr;
      }

      .bottom.supplement-mode .unused-panel .tile-grid{
        grid-template-columns:repeat(auto-fill,minmax(34px,1fr));
        gap:4px;
      }

      .bottom.supplement-mode .unused-panel .tile-img{
        width:34px;
        height:45px;
      }

      .bottom.supplement-mode .unused-panel .tile-btn{
        min-height:47px;
      }

      .played-list,
      .unused-list{
        min-height:84px;
        max-height:22vh;
        padding:5px 1px;
      }

      .small .tile-grid{
        grid-template-columns:repeat(auto-fill,minmax(31px,1fr));
        gap:4px;
      }

      .small .tile-img{
        width:31px;
        height:41px;
      }

      .small .tile-btn{ min-height:43px; }

    function shuffle(arr){
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getAssetCandidates(src){
      if(!src) return [];
      if(src.startsWith('data:')) return [src];
      if(src.startsWith('assets/')) return [src];
      return [src, 'assets/' + src];
    }

    function loadImageWithFallback(src){
      const candidates = getAssetCandidates(src);
      return new Promise((resolve, reject) => {
        let index = 0;
        function tryNext(){
          if(index >= candidates.length){
            reject(new Error('image load failed: ' + src));
            return;
          }
          const img = new Image();
          const current = candidates[index];
          img.onload = () => resolve({ img, src: current });
          img.onerror = () => {
            index += 1;
            tryNext();
          };
          img.src = current;
        }
        tryNext();
      });
    }

    function edgeBgLike(r, g, b, a){
      if(a <= 8) return true;
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      const diff = max - min;
      const avg = (r + g + b) / 3;
      const nearWhite = avg >= 238 && diff <= 30;
      const checkerLight = avg >= 220 && diff <= 22;
      const checkerGray = avg >= 185 && avg <= 232 && diff <= 20;
      return nearWhite || checkerLight || checkerGray;
    }

    function cleanAndCropTransparentImage(image){
      const srcCanvas = document.createElement('canvas');
      const width = image.naturalWidth || image.width;
      const height = image.naturalHeight || image.height;
      srcCanvas.width = width;
      srcCanvas.height = height;
      const ctx = srcCanvas.getContext('2d', { willReadFrequently:true });
      ctx.clearRect(0, 0, width, height);
      ctx.drawImage(image, 0, 0);

      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;
      const visited = new Uint8Array(width * height);
      const queue = [];

      function pushIfBg(x, y){
        if(x < 0 || y < 0 || x >= width || y >= height) return;
        const idx = y * width + x;
        if(visited[idx]) return;
        const p = idx * 4;
        if(edgeBgLike(data[p], data[p+1], data[p+2], data[p+3])){
          visited[idx] = 1;
          queue.push(idx);
        }
      }

      for(let x = 0; x < width; x++){
        pushIfBg(x, 0);
        pushIfBg(x, height - 1);
      }
      for(let y = 0; y < height; y++){
        pushIfBg(0, y);
        pushIfBg(width - 1, y);
      }

      while(queue.length){
        const idx = queue.shift();
        const x = idx % width;
        const y = (idx - x) / width;
        const p = idx * 4;
        data[p + 3] = 0;
        pushIfBg(x + 1, y);
        pushIfBg(x - 1, y);
        pushIfBg(x, y + 1);
        pushIfBg(x, y - 1);
      }

      let minX = width, minY = height, maxX = -1, maxY = -1;
      for(let y = 0; y < height; y++){
        for(let x = 0; x < width; x++){
          const p = (y * width + x) * 4;
          if(data[p + 3] > 20){
            if(x < minX) minX = x;
            if(y < minY) minY = y;
            if(x > maxX) maxX = x;
            if(y > maxY) maxY = y;
          }
        }
      }

      ctx.putImageData(imageData, 0, 0);

        return srcCanvas.toDataURL('image/png');
      }

      const pad = 2;
      minX = Math.max(0, minX - pad);
      minY = Math.max(0, minY - pad);
      maxX = Math.min(width - 1, maxX + pad);
      maxY = Math.min(height - 1, maxY + pad);

      const cropW = maxX - minX + 1;
      const cropH = maxY - minY + 1;
      const out = document.createElement('canvas');
      out.width = cropW;
      out.height = cropH;
      const outCtx = out.getContext('2d');
      outCtx.clearRect(0, 0, cropW, cropH);
      outCtx.drawImage(srcCanvas, minX, minY, cropW, cropH, 0, 0, cropW, cropH);
      return out.toDataURL('image/png');
    }

    async function resolveImageSrc(src){
      if(resolvedSrcCache.has(src)) return resolvedSrcCache.get(src);
      const promise = loadImageWithFallback(src)
        .then(({ src: resolvedSrc }) => resolvedSrc)
        .catch(() => src);
      resolvedSrcCache.set(src, promise);
      return promise;
    }

    async function setDirectTransparentImage(imgEl, src, altText = ''){
      imgEl.alt = altText;
      imgEl.style.display = 'block';
      imgEl.style.background = 'transparent';
      imgEl.style.backgroundColor = 'transparent';
      imgEl.style.border = '0';
      imgEl.style.outline = '0';
      imgEl.style.boxShadow = 'none';
      imgEl.removeAttribute('srcset');
      imgEl.dataset.requestSrc = src;
      imgEl.src = src;
      resolveImageSrc(src).then(resolvedSrc => {
        if(imgEl.dataset.requestSrc === src && imgEl.src !== resolvedSrc){
          imgEl.src = resolvedSrc;
        }
      });
    }

    function preloadImage(src){
      if(!src) return;
      const img = new Image();
      img.decoding = 'async';
      img.src = src;
      if(img.decode) img.decode().catch(() => {});
    }

    }

    function imgFallback(img, tile){
      img.onerror = () => {
        const src = img.getAttribute('src') || '';
        if(src.startsWith('tiles/')){
          img.onerror = () => showTextFallback(img, tile);
          img.src = 'assets/' + src;
          return;
        }
        showTextFallback(img, tile);
      };
    }

    function showTextFallback(img, tile){
      img.onerror = null;
      img.style.display = 'none';
      const parent = img.parentElement;
      if(parent && !parent.querySelector('.fallback-text')){
        const s = document.createElement('span');
        s.className = 'fallback-text';
        s.textContent = tile ? tile.name : '';
        s.style.color = '#ffd15a';
        s.style.fontWeight = '900';
        s.style.fontSize = '14px';
        parent.appendChild(s);
      }
    }

      const btn = document.createElement('button');
      btn.className = 'tile-btn';
      btn.type = 'button';
      btn.dataset.tileId = tile.id;
      btn.removeAttribute('title');

      if(options.selected) btn.classList.add('selected');
      if(options.disabled) btn.classList.add('disabled');
      if(options.supplement) btn.classList.add('supplement');

      const img = document.createElement('img');
      img.className = 'tile-img';
      img.src = getTileImgSrc(tile, !!options.showFront);
      img.alt = options.showFront ? tile.name : '牌背';
      img.draggable = false;
      imgFallback(img, tile);
      btn.appendChild(img);

      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = options.orderLabel ? String(options.orderLabel) : '牌';
      btn.appendChild(badge);

      if(options.onClick) btn.addEventListener('click', () => options.onClick(tile));
      return btn;

    function renderBoardGrid(){
      el.boardGrid.innerHTML = '';
      const nearCells = getNearMissingCells();
      BOARD_TILES.forEach(tile => {
        const cell = document.createElement('div');
        cell.className = 'board-cell';
        cell.dataset.cell = String(tile.cell);
        cell.dataset.key = tile.key;
        cell.dataset.name = tile.name;
        cell.title = tile.boardName || tile.name;
        if(state.placedCells.has(tile.cell)){
          cell.classList.add('placed');
          if(state.supplementCells.has(tile.cell)) cell.classList.add('supplement-placed');
          const img = document.createElement('img');
          img.className = 'board-cell-tile';
          img.src = ASSET.fastTile(tile.key);
          img.alt = tile.name;
          img.draggable = false;
          imgFallback(img, tile);
          cell.appendChild(img);
        }
        if(!state.placedCells.has(tile.cell) && nearCells.has(tile.cell)){
          cell.classList.add('near');
        }
        el.boardGrid.appendChild(cell);

    function renderSelectGrid(){

    function renderPickedGrid(){
      el.pickedGrid.innerHTML = '';
      if(!state.picked.length){
        el.pickedNote.classList.remove('hide');
        return;
      }
      el.pickedNote.classList.add('hide');
      state.picked.forEach(tile => {
        const done = state.playedIds.has(tile.id);
        el.pickedGrid.appendChild(createTileButton(tile, {
          showFront: done,
          disabled: done || state.ended,
          onClick: done || state.ended ? null : () => playPickedTile(tile)
        }));

    function renderUnusedGrid(){
      el.unusedGrid.innerHTML = '';
      if(!state.unused.length){
        el.unusedNote.classList.remove('hide');
        return;
      }
      el.unusedNote.classList.add('hide');

      const allPickedPlayed = state.picked.length > 0 && state.picked.every(t => state.playedIds.has(t.id));
      const canStartSupplement = getNearMissingCells().size > 0;
      state.unused.forEach(tile => {
        const supplementRevealed = state.supplementRevealedIds.has(tile.id);
        const hiddenRevealed = state.hiddenBonusRevealedIds.has(tile.id);
        const canHiddenReveal = state.hiddenBonusActive && !hiddenRevealed && state.hiddenBonusDraws < state.hiddenBonusMaxDraws;
        const canSupplement = state.playing && !state.ended && allPickedPlayed && canStartSupplement && !supplementRevealed && state.supplementUsed < state.maxSupplement;
        const showFront = state.revealUnused || supplementRevealed || hiddenRevealed;
        const disabled = !supplementRevealed && !hiddenRevealed && (!canSupplement && !canHiddenReveal && !state.revealUnused);
        el.unusedGrid.appendChild(createTileButton(tile, {
          showFront,
          disabled,
          onClick: canHiddenReveal ? () => revealHiddenBonusTile(tile) : canSupplement ? () => revealSupplementTile(tile) : null
        }));
      });
    }

    function isSupplementPhase(){
      if(state.hiddenBonusActive) return true;
      const allPickedPlayed = state.picked.length > 0 && state.picked.every(t => state.playedIds.has(t.id));
      const hasNearLine = getNearMissingCells().size > 0;
      const hasSupplementChoices = state.unused.some(t => !state.supplementRevealedIds.has(t.id));
      return state.playing && !state.ended && allPickedPlayed && hasNearLine && state.supplementUsed < state.maxSupplement && hasSupplementChoices;
    }

    function updateBottomMode(){
      const supplementMode = isSupplementPhase();
      const hideBottom = !state.started || state.choosing;
      const pickedOnly = state.playing && !supplementMode;
      el.bottomArea.classList.toggle('bottom-hidden', hideBottom);
      el.bottomArea.classList.toggle('picked-only', pickedOnly);
      el.bottomArea.classList.toggle('supplement-mode', supplementMode);
      if(state.hiddenBonusActive){
        el.unusedTitle.textContent = `選擇補牌${state.hiddenBonusMaxDraws}張`;
      }else if(supplementMode){
        el.unusedTitle.textContent = `選擇補牌${state.maxSupplement}張`;
      }else{
        el.unusedTitle.textContent = '';
      }
    }

    function renderAll(){
      renderBoardGrid();
      renderSelectGrid();
      updateBottomMode();
      renderPickedGrid();
      renderUnusedGrid();
      updateCounters();
      if(state.ended) drawLines(getCompletedLines());
    }

    function setStatusMessage(message){
      el.hintText.classList.remove('hide');
      el.hintText.textContent = message;
    }

    function revealSupplementTile(tile){
      if(!state.playing || state.ended) return;
      const allPickedPlayed = state.picked.length > 0 && state.picked.every(t => state.playedIds.has(t.id));
      const canStartSupplement = getNearMissingCells().size > 0;
      if(!allPickedPlayed || !canStartSupplement || state.supplementUsed >= state.maxSupplement || state.supplementRevealedIds.has(tile.id)) return;

      state.supplementRevealedIds.add(tile.id);
      state.supplementUsed += 1;

      const noSupplementLeft = state.supplementUsed >= state.maxSupplement;
      const hasSupplementChoices = state.unused.some(t => !state.supplementRevealedIds.has(t.id));
      if(noSupplementLeft || !hasSupplementChoices){
        endGame();
      }else{
        updateResultDuringGame();
        renderAll();
      }
    }

    function revealHiddenBonusTile(tile){
      if(!state.hiddenBonusActive || state.hiddenBonusRevealedIds.has(tile.id)) return;
      if(state.hiddenBonusDraws >= state.hiddenBonusMaxDraws) return;

      state.hiddenBonusRevealedIds.add(tile.id);
      state.hiddenBonusDraws += 1;
      if(tile.key === state.hiddenBonusMissingKey){
        state.hiddenBonusWon = true;
      }

      if(state.hiddenBonusWon || state.hiddenBonusDraws >= state.hiddenBonusMaxDraws){
        finalizeGameResult();
      }else{
        setStatusMessage(`隱藏補牌機會：已抽 ${state.hiddenBonusDraws}/${state.hiddenBonusMaxDraws} 張。`);
        renderUnusedGrid();
      }
    }

    function updateCounters(){

      el.selectCounter.textContent = `${selected} / ${state.chooseCount}`;
      el.pickedCounter.textContent = state.picked.length ? `${state.picked.filter(t => state.playedIds.has(t.id)).length} / ${state.picked.length}` : '0';

    async function openPeek(tile, source){
      if(!state.playing || state.ended) return;
      const tileKey = tile && tile.key ? tile.key : '';
      const tileSrc = tileKey ? ASSET.fastTile(tileKey) : ASSET.fastBack;
      el.peekTile.src = tileSrc;
      el.peekTile.setAttribute('src', tileSrc);
      el.peekTile.alt = tile && tile.name ? tile.name : '麻將';
      el.peekTile.style.display = 'block';
      el.fingerImg.src = ASSET.finger;
      el.fingerImg.setAttribute('src', ASSET.finger);
      el.fingerImg.style.display = 'block';
      const layout = getPeekLayoutPoints();
      moveFinger(layout.finger.x, layout.finger.y);
      movePeekTile(layout.tile.x, layout.tile.y);

      state.activePeek = { tile, source };
      state.draggingPeek = false;
      state.manualPlacing = false;
      state.draggingTile = false;
      const peekToken = Date.now() + Math.random();
      state.peekToken = peekToken;
      el.peekMask.classList.add('show');
      el.peekMask.classList.toggle('manual-place', !state.autoPlace);
      el.peekMask.classList.remove('tile-place');
      el.fingerImg.classList.remove('dragging');
      el.peekTile.classList.remove('dragging');

      if(state.peekToken !== peekToken) return;
      el.peekTile.style.display = 'block';
      el.fingerImg.style.display = 'block';
    }

    function playPickedTile(tile){
      if(!state.playing || state.ended || state.playedIds.has(tile.id)) return;
      if(shouldPeekTile(tile)){
        openPeek(tile, 'picked');
        return;
      }
      completeTilePlacement(tile);
    }

    function closePeekWithoutPlace(message){
      if(!state.activePeek) return;
      state.activePeek = null;
      state.peekToken = null;
      state.draggingPeek = false;

      state.fingerOffsetY = 0;
      state.tileOffsetX = 0;
      state.tileOffsetY = 0;
      el.fingerImg.classList.remove('dragging');

      el.peekMask.classList.remove('manual-place');
      el.peekMask.classList.remove('tile-place');
      el.peekTile.classList.remove('dragging');
      el.peekWrap.style.left = '';

    function clearPeekState(){
      state.activePeek = null;
      state.peekToken = null;
      state.draggingPeek = false;
      state.manualPlacing = false;
      state.draggingTile = false;
      state.fingerOffsetX = 0;
      state.fingerOffsetY = 0;
      state.tileOffsetX = 0;
      state.tileOffsetY = 0;
      el.fingerImg.classList.remove('dragging');
      el.peekMask.classList.remove('show');
      el.peekMask.classList.remove('manual-place');
      el.peekMask.classList.remove('tile-place');
      el.peekTile.classList.remove('dragging');
      el.peekWrap.style.left = '';
      el.peekWrap.style.top = '';
      el.peekWrap.style.position = '';
      el.peekWrap.style.transform = '';
    }

    function completeTilePlacement(tile){
      state.placedCells.add(tile.cell);
      state.playedIds.add(tile.id);

      const completed = getCompletedLines();
      const allPickedPlayed = state.picked.length > 0 && state.picked.every(t => state.playedIds.has(t.id));
      const noSupplementLeft = state.supplementUsed >= state.maxSupplement;
      const supplementStarted = state.supplementUsed > 0;
      const hasSupplementChoices = state.unused.some(t => !state.supplementRevealedIds.has(t.id));
      const hasNearLine = getNearMissingCells().size > 0;
      const canSupplement = allPickedPlayed && hasNearLine && !noSupplementLeft && hasSupplementChoices;

      if(allPickedPlayed && completed.length > 0 && !supplementStarted){
        endGame();
      }else if(allPickedPlayed && !canSupplement){
        endGame();
      }else{
        updateResultDuringGame();
        renderAll();
      }
    }

    function closePeekAndPlace(){
      if(!state.activePeek) return;
      const { tile } = state.activePeek;
      clearPeekState();
      completeTilePlacement(tile);
    }

    function enterManualTilePlacement(){
      if(!state.activePeek) return;
      state.draggingPeek = false;
      state.manualPlacing = true;
      state.draggingTile = false;
      el.fingerImg.classList.remove('dragging');
      el.fingerImg.style.display = 'none';
      el.peekMask.classList.remove('manual-place');
      el.peekMask.classList.add('tile-place');
      const layout = getPeekLayoutPoints();
      movePeekTile(layout.manualTile.x, layout.manualTile.y);
      setStatusMessage('請拖曳麻將牌，放到背板上對應的格子。');
    }

    function tryCompleteManualPlacement(){
      if(!state.activePeek) return;
      const { tile } = state.activePeek;
      const dropCell = getBoardCellFromPeekTile();
      if(dropCell !== tile.cell){
        setStatusMessage('位置不正確，請把麻將拖到背板上對應的格子。');
        return;
      }
      closePeekAndPlace();
    }

    function moveFinger(x,y){
      el.fingerImg.style.left = `${x}px`;
      el.fingerImg.style.top = `${y}px`;
    }

    function getPeekLayoutPoints(){
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      const centerX = viewportWidth / 2;
      const centerY = viewportHeight / 2;
      const manualLift = Math.min(90, viewportHeight * 0.12);
      return {
        finger: { x: centerX, y: centerY },
        tile: { x: centerX, y: centerY },
        manualTile: { x: centerX, y: centerY - manualLift }
      };
    }

    function movePeekTile(x,y){
      el.peekWrap.style.left = `${x}px`;
      el.peekWrap.style.top = `${y}px`;
      el.peekWrap.style.position = 'fixed';
      el.peekWrap.style.transform = 'translate(-50%,-50%)';
    }

    function getBoardCellFromPeekTile(){
      const tileRect = el.peekWrap.getBoundingClientRect();
      const x = tileRect.left + tileRect.width / 2;
      const y = tileRect.top + tileRect.height / 2;
      const cells = [...el.boardGrid.children];
      for(const cell of cells){
        const rect = cell.getBoundingClientRect();
        if(x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom){
          return Number(cell.dataset.cell);
        }
      }
      return null;
    }

    function getPointFromEvent(ev){
      const t = ev.touches && ev.touches[0] ? ev.touches[0] : ev.changedTouches && ev.changedTouches[0] ? ev.changedTouches[0] : ev;
      return { x:t.clientX, y:t.clientY };
    }

    function onPeekMove(ev){
      if(!state.activePeek || !state.draggingPeek) return;
      ev.preventDefault();
      const p = getPointFromEvent(ev);
      moveFinger(p.x + state.fingerOffsetX, p.y + state.fingerOffsetY);
    }

    function onPeekStart(ev){
      if(!state.activePeek) return;
      ev.preventDefault();
      state.draggingPeek = true;
      el.fingerImg.classList.add('dragging');
      const p = getPointFromEvent(ev);
      const rect = el.fingerImg.getBoundingClientRect();
      state.fingerOffsetX = rect.left + rect.width / 2 - p.x;
      state.fingerOffsetY = rect.top + rect.height / 2 - p.y;
    }

    function onPeekEnd(ev){
      if(!state.activePeek || !state.draggingPeek) return;
      ev.preventDefault();
      if(state.autoPlace){
        closePeekAndPlace();
      }else{
        enterManualTilePlacement();
      }
    }

    function onTileDragStart(ev){
      if(!state.activePeek || !state.manualPlacing) return;
      ev.preventDefault();
      state.draggingTile = true;
      el.peekTile.classList.add('dragging');
      const p = getPointFromEvent(ev);
      const tileRect = el.peekWrap.getBoundingClientRect();
      state.tileOffsetX = tileRect.left + tileRect.width / 2 - p.x;
      state.tileOffsetY = tileRect.top + tileRect.height / 2 - p.y;
    }

    function onTileDragMove(ev){
      if(!state.activePeek || !state.manualPlacing || !state.draggingTile) return;
      ev.preventDefault();
      const p = getPointFromEvent(ev);
      movePeekTile(p.x + state.tileOffsetX, p.y + state.tileOffsetY);
    }

    function onTileDragEnd(ev){
      if(!state.activePeek || !state.manualPlacing || !state.draggingTile) return;
      ev.preventDefault();
      state.draggingTile = false;
      el.peekTile.classList.remove('dragging');
      tryCompleteManualPlacement();
    }

    function getCompletedLines(){
      return LINES.filter(line => line.every(cell => state.placedCells.has(cell)));
    }

    function hasAllCells(cells){
      return cells.every(cell => state.placedCells.has(cell));
    }

    function getPlacedKeys(){
      const keys = new Set();
      BOARD_TILES.forEach(tile => {
        if(state.placedCells.has(tile.cell)) keys.add(tile.key);
      });
      return keys;
    }

    function hasAllKeys(requiredKeys, placedKeys = getPlacedKeys()){
      return requiredKeys.every(key => placedKeys.has(key));
    }

    function hasSupplementLineHit(){
      if(!state.supplementRevealedIds.size) return false;
      const nearCells = getNearMissingCells();
      return state.unused.some(tile => state.supplementRevealedIds.has(tile.id) && nearCells.has(tile.cell));
    }

    function getHiddenBonusInfo(){
      if(state.hiddenBonusResolved) return null;
      if(state.supplementUsed >= state.maxSupplement) return null;
      const dragonKeys = ['dragon_red','dragon_green','dragon_white'];
      const placedKeys = getPlacedKeys();
      const placedDragonKeys = dragonKeys.filter(key => placedKeys.has(key));
      if(placedDragonKeys.length !== 2) return null;
      const missingKey = dragonKeys.find(key => !placedKeys.has(key));
      const missingTile = state.unused.find(tile => tile.key === missingKey);
      if(!missingTile) return null;
      return { missingKey, missingName: missingTile.name };
    }

    function getNearMissingCells(){
      const missing = new Set();
      LINES.forEach(line => {
        const placedCount = line.filter(cell => state.placedCells.has(cell)).length;
        if(placedCount === 5){
          const m = line.find(cell => !state.placedCells.has(cell));
          if(m !== undefined) missing.add(m);
        }
      });
      return missing;
    }

    function drawLines(lines){
      el.lineLayer.innerHTML = '';
      lines.forEach(line => {
        const a = line[0];
        const b = line[line.length - 1];
        const aCol = a % 6;
        const aRow = Math.floor(a / 6);
        const bCol = b % 6;
        const bRow = Math.floor(b / 6);
        const ax = (BOARD_GRID_X[aCol] + BOARD_GRID_X[aCol + 1]) / 2;
        const ay = (BOARD_GRID_Y[aRow] + BOARD_GRID_Y[aRow + 1]) / 2;
        const bx = (BOARD_GRID_X[bCol] + BOARD_GRID_X[bCol + 1]) / 2;
        const by = (BOARD_GRID_Y[bRow] + BOARD_GRID_Y[bRow + 1]) / 2;
        const lineEl = document.createElementNS('http://www.w3.org/2000/svg','line');
        lineEl.setAttribute('x1', ax);
        lineEl.setAttribute('y1', ay);
        lineEl.setAttribute('x2', bx);
        lineEl.setAttribute('y2', by);
        el.lineLayer.appendChild(lineEl);
      });
    }

    function calculateRewards(){
      const completedCount = getCompletedLines().length;
      const rewards = [];

      function add(name, multiplier){
        rewards.push({ name, multiplier, label: `${name}*${multiplier}倍`, amount: state.bet * multiplier });
      }

      if(hasSupplementLineHit()) add('聽牌補牌成功', 1.2);

      if(completedCount === 1) add('一連線', 1.5);
      if(completedCount === 2) add('二連線', 2);
      if(completedCount >= 3) add('三連線', 2.5);

      const multiplier = rewards.reduce((sum, reward) => sum + reward.multiplier, 0);
      const amount = rewards.reduce((sum, reward) => sum + reward.amount, 0);
      return { completedCount, rewards, multiplier, amount };
    }

    function updateResultDuringGame(){
      const completed = getCompletedLines();
      const allPickedPlayed = state.picked.length > 0 && state.picked.every(t => state.playedIds.has(t.id));
      const hasNearLine = getNearMissingCells().size > 0;
      let text = `已抽出 <b>${state.placedCells.size}</b> 張牌。`;
      if(completed.length){
        text += ` 已完成 <b>${completed.length}</b> 條賓果。`;
      }
      if(!allPickedPlayed){
        text += ` 需先抽完已選的 <b>${state.picked.length}</b> 張，才會開放補牌。`;
      }else if(hasNearLine && state.supplementUsed < state.maxSupplement){
        text += ` 可從未選牌堆盲選補牌，目前補牌 <b>${state.supplementUsed}/${state.maxSupplement}</b> 張。`;
      }
      setStatusMessage(text.replace(/<[^>]+>/g, ''));
    }

    function endGame(){
      state.ended = true;
      state.playing = false;
      state.choosing = false;
      const completed = getCompletedLines();
      drawLines(completed);
      finalizeGameResult();
    }

    function enterHiddenBonus({ missingKey, missingName }){
      state.hiddenBonusActive = true;
      state.hiddenBonusResolved = true;
      state.hiddenBonusWon = false;
      state.hiddenBonusMissingKey = missingKey;
      state.hiddenBonusRevealedIds = new Set();
      state.hiddenBonusDraws = 0;
      el.btnRevealUnused.disabled = true;
      setStatusMessage(`隱藏補牌機會：從未選牌堆抽選 3 張，抽到 ${missingName} 可獲得押注 x1。`);
      renderAll();
      showResultModal({
        title: '恭喜獲得隱藏補牌機會',
        html: `你已抽到中、發、白板其中 2 張。<br>請從未選牌堆抽選 <b>3</b> 張。<br>若抽到 <b>${missingName}</b>，可獲得押注金幣 x1。`
      });
    }

    function finalizeGameResult(){
      state.hiddenBonusActive = false;
      state.hiddenBonusResolved = true;
      const completed = getCompletedLines();
      const rewardResult = calculateRewards();
      if(window.parent && window.parent !== window){
        window.parent.postMessage({
          type:'mahjong-bingo-bonus-complete',
          multiplier: rewardResult.multiplier || 1,
          rewards: rewardResult.rewards.map(reward => reward.label)
        }, window.location.origin);
      }
      state.coins += rewardResult.amount;
      updateCoinText();
      el.btnStartGame.disabled = false;
      el.btnRevealUnused.disabled = false;
      const rewardText = rewardResult.rewards.length
        ? rewardResult.rewards.map((reward, index) => `${index === 0 ? '獎項:' : ''}${reward.label}`).join('<br>')
        : '未中獎';
      const amountText = rewardResult.multiplier > 0
        ? `${state.bet}*${rewardResult.multiplier}=${rewardResult.amount}`
        : '0';
      el.hintText.textContent = '';
      el.hintText.classList.add('hide');
      renderAll();
      showResultModal({
        title: rewardResult.amount > 0 ? '恭喜中獎' : '未中獎',
        html: `遊戲結束，共完成 <b>${completed.length}</b> 條賓果。<br>${rewardText}<br>本局獲得:${amountText}`
      });
    }

    function toggleRevealUnused(){
      if(!state.ended) return;
      state.revealUnused = !state.revealUnused;
      el.btnRevealUnused.textContent = state.revealUnused ? '隱藏未選牌' : '查看未選牌';
      renderUnusedGrid();
    }

    function getSelectTileFromTarget(target){
      const btn = target && target.closest ? target.closest('.tile-btn') : null;
      if(!btn || !el.selectGrid.contains(btn)) return null;
      return getDeckTileById(btn.dataset.tileId);
    }

    function onSelectPointerDown(ev){
      if(!state.choosing) return;
      const tile = getSelectTileFromTarget(ev.target);
      if(!tile) return;
      ev.preventDefault();
      state.selectingDrag = true;
      state.selectDragVisited = new Set([tile.id]);
      toggleSelect(tile);
    }

    function onSelectPointerOver(ev){
      if(!state.selectingDrag || !state.choosing) return;
      const tile = getSelectTileFromTarget(ev.target);
      if(!tile || state.selectDragVisited.has(tile.id)) return;
      state.selectDragVisited.add(tile.id);
      selectTile(tile);
    }

    function onSelectPointerMove(ev){
      if(!state.selectingDrag || !state.choosing) return;
      ev.preventDefault();
      const target = document.elementFromPoint(ev.clientX, ev.clientY);
      const tile = getSelectTileFromTarget(target);
      if(!tile || state.selectDragVisited.has(tile.id)) return;
      state.selectDragVisited.add(tile.id);
      selectTile(tile);
    }

    function onSelectTouchMove(ev){
      if(!state.selectingDrag || !state.choosing) return;
      const touch = ev.touches && ev.touches[0];
      if(!touch) return;
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const tile = getSelectTileFromTarget(target);
      if(!tile || state.selectDragVisited.has(tile.id)) return;
      ev.preventDefault();
      state.selectDragVisited.add(tile.id);
      selectTile(tile);
    }

    function endSelectDrag(){
      state.selectingDrag = false;
      state.selectDragVisited = new Set();
    }

    function toggleBgm(){
      state.bgmPlaying = !state.bgmPlaying;
      if(state.bgmPlaying){
        playBgm();
      }else{
        el.bgmPlayer.pause();
      }
      updateBgmButton();
    }

    function playBgm(){
      if(!state.bgmPlaying) return;
      applyBgmVolume();
      if(state.audioCtx && state.audioCtx.state === 'suspended'){
        state.audioCtx.resume().catch(() => {});
      }
      el.bgmPlayer.currentTime = el.bgmPlayer.currentTime || 0;
      el.bgmPlayer.play().catch(() => {
        updateBgmButton();
      });
    }

    function getBgmVolume(){
      return window.matchMedia('(max-width:760px)').matches ? 1 : 0.3;
    }

    function getBgmSrc(){
      return window.matchMedia('(max-width:760px)').matches
        ? 'gmae.mobile.mp3?v=audio-mobile-low-v2'
        : 'gmae.mp3?v=audio-low-file-v1';
    }

    function applyBgmSource(){
      const src = getBgmSrc();
      if(el.bgmPlayer.getAttribute('src') === src) return;
      el.bgmPlayer.pause();
      el.bgmPlayer.setAttribute('src', src);
      el.bgmPlayer.load();
    }

    function setupAudioOutput(){
      if(state.bgmGain) return;
      try{
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if(!AudioCtx) return;
        state.audioCtx = state.audioCtx || new AudioCtx();
        state.bgmSource = state.bgmSource || state.audioCtx.createMediaElementSource(el.bgmPlayer);
        state.bgmGain = state.audioCtx.createGain();
        state.bgmSource.connect(state.bgmGain);
        state.bgmGain.connect(state.audioCtx.destination);
      }catch(_err){
        state.bgmGain = null;
      }
    }

    function applyBgmVolume(){
      const volume = getBgmVolume();
      applyBgmSource();
      el.bgmPlayer.volume = volume;
      setupAudioOutput();
      if(state.bgmGain) state.bgmGain.gain.value = volume;
    }

    function playBgmAfterGesture(){
      if(state.bgmPlaying && el.bgmPlayer.paused){
        playBgm();
      }
    }

    function updateBgmButton(){
      el.btnBgm.textContent = '♪';
      el.btnBgm.classList.toggle('off', !state.bgmPlaying);
      el.btnBgm.setAttribute('aria-label', state.bgmPlaying ? '關閉背景音樂' : '開啟背景音樂');
      el.btnBgm.title = state.bgmPlaying ? '關閉背景音樂' : '開啟背景音樂';
    }

    function toggleAutoPlace(){
      state.autoPlace = el.autoPlaceToggle.checked;
    }

    function updateBet(){
      state.bet = Number(el.betSelect.value) || 100;
    }

    function rewardAdCoins(){
      state.coins += 500;
      flashCoinGain(500);
    }

    function openHelpModal(){
      el.helpModal.classList.add('show');
      el.helpModal.setAttribute('aria-hidden', 'false');
    }

    function closeHelpModal(){
      el.helpModal.classList.remove('show');
      el.helpModal.setAttribute('aria-hidden', 'true');
    }

    function showResultModal({ title, html, imageSrc = '' }){
      el.resultTitle.textContent = title;
      el.resultContent.innerHTML = html;
      if(imageSrc){
        el.resultImage.src = imageSrc;
        el.resultImageWrap.classList.add('show');
      }else{
        el.resultImage.removeAttribute('src');
        el.resultImageWrap.classList.remove('show');
      }
      el.resultModal.classList.add('show');
      el.resultModal.setAttribute('aria-hidden', 'false');
    }

    function closeResultModal(){
      el.resultModal.classList.remove('show');
      el.resultModal.setAttribute('aria-hidden', 'true');
    }

    el.btnDone.addEventListener('click', finishChoosing);
    el.btnRevealUnused.addEventListener('click', toggleRevealUnused);
    el.autoPlaceToggle.addEventListener('change', toggleAutoPlace);
    el.betSelect.addEventListener('change', updateBet);
    el.btnStartGame.addEventListener('click', startGame);
    el.btnAdReward.addEventListener('click', rewardAdCoins);
    el.btnSecretCount.addEventListener('click', toggleSecretChooseCount);
    el.btnHelp.addEventListener('click', openHelpModal);
    el.btnHelpClose.addEventListener('click', closeHelpModal);
    el.helpModal.addEventListener('click', ev => {
      if(ev.target === el.helpModal) closeHelpModal();
    });
    el.btnResultClose.addEventListener('click', closeResultModal);
    el.resultModal.addEventListener('click', ev => {
      if(ev.target === el.resultModal) closeResultModal();
    });
    el.btnBgm.addEventListener('click', toggleBgm);
    applyBgmVolume();
    updateBet();
    updateChooseCountUi();
    updateCoinText();
    updateBgmButton();
    window.addEventListener('resize', applyBgmVolume);

    if(window.PointerEvent){
      el.selectGrid.addEventListener('pointerdown', onSelectPointerDown, { passive:false });
      el.selectGrid.addEventListener('pointermove', onSelectPointerMove, { passive:false });
      window.addEventListener('pointerup', endSelectDrag);
      window.addEventListener('pointercancel', endSelectDrag);
    }else{
      el.selectGrid.addEventListener('mousedown', onSelectPointerDown, { passive:false });
      el.selectGrid.addEventListener('mouseover', onSelectPointerOver, { passive:false });
      el.selectGrid.addEventListener('touchstart', onSelectPointerDown, { passive:false });
      el.selectGrid.addEventListener('touchmove', onSelectTouchMove, { passive:false });
      window.addEventListener('mouseup', endSelectDrag);
      window.addEventListener('touchend', endSelectDrag);
      window.addEventListener('touchcancel', endSelectDrag);
    }

    el.fingerImg.addEventListener('mousedown', onPeekStart, { passive:false });
    el.fingerImg.addEventListener('touchstart', onPeekStart, { passive:false });
    el.peekMask.addEventListener('mousemove', onPeekMove, { passive:false });
    el.peekMask.addEventListener('mouseup', onPeekEnd, { passive:false });
    el.peekMask.addEventListener('mouseleave', onPeekEnd, { passive:false });
    el.peekMask.addEventListener('touchmove', onPeekMove, { passive:false });
    el.peekMask.addEventListener('touchend', onPeekEnd, { passive:false });
    el.peekMask.addEventListener('touchcancel', onPeekEnd, { passive:false });
    el.peekWrap.addEventListener('mousedown', onTileDragStart, { passive:false });
    el.peekWrap.addEventListener('touchstart', onTileDragStart, { passive:false });
    el.peekMask.addEventListener('mousemove', onTileDragMove, { passive:false });
    el.peekMask.addEventListener('touchmove', onTileDragMove, { passive:false });
    el.peekMask.addEventListener('mouseup', onTileDragEnd, { passive:false });
    el.peekMask.addEventListener('mouseleave', onTileDragEnd, { passive:false });
    el.peekMask.addEventListener('touchend', onTileDragEnd, { passive:false });
    el.peekMask.addEventListener('touchcancel', onTileDragEnd, { passive:false });

    startGame();
  </script>
</body>
</html>
